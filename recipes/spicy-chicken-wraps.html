        <div class="content">
            <h2>Spicy Chicken Wraps</h2>
            <div class="box preamble">
                <img src="../assets/images/recipes/spicy-chicken-wraps.jpg">
                <div class="text">One of my favorite cheat meals, very quick and easy to prepare, and interactive to eat.</div>
                <div class="text">Serves 3 | Takes 40 mins</div>
                <div class="text">Original recipe: Sebastian Troy</div>
                <div class="recipe_tags"><span class="tag">main</span><span class="tag">egg</span><span class="tag">meat</span></div>
            </div>
            <div class="pair">
                <div class="box">
                    <h3>
                        Ingredients
                    </h3>
                    <ul>
    <li><input type="checkbox" class="ingredient_checkbox"><label>250g chicken</label></li>
    <li><input type="checkbox" class="ingredient_checkbox"><label>panko breadcrumbs</label></li>
    <li><input type="checkbox" class="ingredient_checkbox"><label>3 tbsp dried mixed herbs</label></li>
    <li><input type="checkbox" class="ingredient_checkbox"><label>1 large egg</label></li>
    <li><input type="checkbox" class="ingredient_checkbox"><label>50g plain flour</label></li>
    <li><input type="checkbox" class="ingredient_checkbox"><label>50g smoked paprika</label></li>
    <li><input type="checkbox" class="ingredient_checkbox"><label>pinch of salt</label></li>
    <li><input type="checkbox" class="ingredient_checkbox"><label>dash of chilli flakes</label></li>
    <li><input type="checkbox" class="ingredient_checkbox"><label>lettuce to serve</label></li>
    <li><input type="checkbox" class="ingredient_checkbox"><label>hot sauce to serve</label></li>
    <li><input type="checkbox" class="ingredient_checkbox"><label>wraps to serve</label></li>
    <li><input type="checkbox" class="ingredient_checkbox"><label>mayo to serve</label></li>
</ul>
                </div>
                <div class="two_thirds box"">
                    <h3>
                        Method
                    </h3>
                    <ol>
    <li><input type="checkbox" class="method_checkbox"><label>Prepare three coating stations, i.e. large bowls or deep dishes</label></li>
    <li><input type="checkbox" class="method_checkbox"><label>In the first dish, mix the flour, paprika, and salt</label></li>
    <li><input type="checkbox" class="method_checkbox"><label>In the second dish, gently scramble the egg</label></li>
    <li><input type="checkbox" class="method_checkbox"><label>In the third dish, mix the panko, mixed herbs, and chilli flakes</label></li>
    <li><input type="checkbox" class="method_checkbox"><label>Cut the chicken into bite-sized pieces and add to the first dish, thoroughly mixing until every piece is evenly coated and dry. Add more paprika or flour if needed.</label></li>
    <li><input type="checkbox" class="method_checkbox"><label>Transfer the now dry chicken pieces to the egg bowl, and again coat evenly</label></li>
    <li><input type="checkbox" class="method_checkbox"><label>Preheat the oven to 180C (fan)</label></li>
    <li><input type="checkbox" class="method_checkbox"><label>Prepare a baking tray, and one-by-one transfer a piece of egged chicken into the breadcrumbs, use one hand for this, and the other to coat the chicken in breadcrumbs and transfer to the baking tray.</label></li>
    <li><input type="checkbox" class="method_checkbox"><label>Cook the chicken for 25 minutes, or until cooked through and crispy</label></li>
    <li><input type="checkbox" class="method_checkbox"><label>Serve alongside lettuce, hot sauce, and wraps, so people can construct their own wraps</label></li>
</ol>

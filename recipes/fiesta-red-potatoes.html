        <div class="content">
            <h2>Fiesta Red Potatoes</h2>
            <div class="box preamble">
                <img src="../assets/images/recipes/fiesta-red-potatoes.jpg">
                <div class="text">A delicious addition to any Spanish tapas night.</div>
                <div class="text">Serves 4 | Takes 45 mins</div>
                <div class="text">Original recipe: <a href="https://www.tasteofhome.com/recipes/fiesta-red-potatoes/" target="_blank">https://www.tasteofhome.com/recipes/fiesta-red-potatoes/</a></div>
                <div class="recipe_tags"><span class="tag">side</span></div>
            </div>
            <div class="pair">
                <div class="box">
                    <h3>
                        Ingredients
                    </h3>
                    <ul>
    <li><input type="checkbox" class="ingredient_checkbox"><label>4 medium red potatoes, cut into 1/2-inch cubes</label></li>
    <li><input type="checkbox" class="ingredient_checkbox"><label>1 medium onion, chopped</label></li>
    <li><input type="checkbox" class="ingredient_checkbox"><label>2 jalapeno peppers, seeded and chopped</label></li>
    <li><input type="checkbox" class="ingredient_checkbox"><label>1/4 teaspoon salt-free seasoning blend</label></li>
    <li><input type="checkbox" class="ingredient_checkbox"><label>1/4 teaspoon pepper</label></li>
    <li><input type="checkbox" class="ingredient_checkbox"><label>2 teaspoons canola oil</label></li>
    <li><input type="checkbox" class="ingredient_checkbox"><label>2 small tomatoes, chopped</label></li>
</ul>
                </div>
                <div class="two_thirds box"">
                    <h3>
                        Method
                    </h3>
                    <ol>
    <li><input type="checkbox" class="method_checkbox"><label>In a large nonstick skillet, saute the potatoes, onion, jalapenos, seasoning blend and pepper in oil for 30–35 minutes or until potatoes are tender.</label></li>
    <li><input type="checkbox" class="method_checkbox"><label>Stir in tomatoes; heat through.</label></li>
</ol>
                </div>
            </div>

        <link rel="icon" type="image/x-icon" href="assets/icons/logo.png">
        <link rel="stylesheet" href="assets/fonts/fonts.css">
        <link rel="stylesheet" href="assets/styles/shared.css">
        <link rel="stylesheet" href="assets/styles/toolbar.css">
        <link rel="stylesheet" href="assets/styles/recipes.css">
        <script src="assets/scripts/shared.js"></script>
        <script src="assets/scripts/toolbar.js"></script>
        <script src="assets/scripts/recipes.js"></script>

    <body>
        <div class="toolbar">
            <div class="toolbar_content">
                <a class="toolbar_logo" href="index.html"></a>
                <input type="checkbox" id="toolbar_hamburger_menu" style="display: none;">
                <label for="toolbar_hamburger_menu" class="toolbar_buttons_toggle"></label>
                <div class="toolbar_buttons_container">
                    <a class="toolbar_button" href="index.html">Projects</a>
                    <hr class="toolbar_button_spacer">
                    <a class="toolbar_button" href="recipes.html">Recipes</a>
                    <hr class="toolbar_button_spacer">
                    <a class="toolbar_button" href="contact.html">Contact</a>
                </div>
            </div>
        </div>
        <div class="content">
            <h2>Recipes</h2>

            <div class="js_enabled_only">
                <div class="recipe_filters">
                    <!-- TYPE FILTER TOGGLES SENTINEL -->
                </div>
                <div class="recipe_filters">
                    <!-- DIETARY FILTER TOGGLES SENTINEL -->
                </div>
                <div class="recipe_filters">
                    <!-- COOKTIME SLIDERS SENTINEL -->
                </div>
                <div class="recipe_filters">
                    <!-- SERVINGS SLIDERS SENTINEL -->
                </div>
                <div class="sorting_buttons">
                    <input type="radio" name="sort" id="sort_name" class="sorting_radio" data-sort-by="name" hidden>
                    <label for="sort_name" class="sorting_button">Sort by Name</label>
                    <input type="radio" name="sort" id="sort_cook" class="sorting_radio" data-sort-by="cook-time" hidden>
                    <label for="sort_cook" class="sorting_button">Sort by Cook Time</label>
                    <input type="radio" name="sort" id="sort_serves" class="sorting_radio" data-sort-by="serves" hidden>
                    <label for="sort_serves" class="sorting_button">Sort by Serves</label>
                </div>
            </div>

            <div class="grid">
                <!-- RECIPE CARDS SENTINEL -->
            </div>
            <hr class="section_end">
        </div>
